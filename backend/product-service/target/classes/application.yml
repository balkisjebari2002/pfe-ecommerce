server:
  port: 8082

spring:
  application:
    name: product-service
  data:
    mongodb:
      uri: mongodb://${MONGO_HOST:localhost}:27017/products_db

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:bXlzdXBlcnNlY3JldGtleWZvcnBmZWVjb21tZXJjZTIwMjQ=}

management:
  endpoints:
    web:
      exposure:
        include: health,info
