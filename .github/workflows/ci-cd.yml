name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

env:
  DOCKER_USERNAME: balkisjebari2002

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push discovery-service
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/discovery-service/Dockerfile
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/discovery-service:latest

      - name: Build and push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/api-gateway/Dockerfile
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/api-gateway:latest

      - name: Build and push user-service
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/user-service/Dockerfile
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/user-service:latest

      - name: Build and push product-service
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/product-service/Dockerfile
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/product-service:latest

      - name: Build and push order-service
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/order-service/Dockerfile
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/order-service:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/ecommerce-app
          file: ./frontend/ecommerce-app/Dockerfile
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/frontend:latest

  deploy:
    name: Deploy to Kubernetes
    runs-on: self-hosted
    needs: build-and-push
    steps:
      - name: Login to Docker Hub
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull latest images
        run: |
          docker pull balkisjebari2002/api-gateway:latest
          docker pull balkisjebari2002/user-service:latest
          docker pull balkisjebari2002/product-service:latest
          docker pull balkisjebari2002/order-service:latest
          docker pull balkisjebari2002/discovery-service:latest
          docker pull balkisjebari2002/frontend:latest

      - name: Restart deployments
        run: |
          kubectl rollout restart deployment/api-gateway
          kubectl rollout restart deployment/user-service
          kubectl rollout restart deployment/product-service
          kubectl rollout restart deployment/order-service
          kubectl rollout restart deployment/discovery-service
          kubectl rollout restart deployment/frontend

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/api-gateway --timeout=120s
          kubectl rollout status deployment/frontend --timeout=120s

      - name: Show pod status
        run: kubectl get pods -o wide
