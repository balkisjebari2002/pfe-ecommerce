version: "3.9"

services:

  # ─── Databases ──────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: pfe-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: pfe-mongo
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo/init.js:/docker-entrypoint-initdb.d/init.js
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Infrastructure ──────────────────────────────────────────────────────────

  discovery-service:
    build:
      context: ./backend
      dockerfile: discovery-service/Dockerfile
    container_name: pfe-discovery
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    container_name: pfe-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_URL: http://discovery-service:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-bXlzdXBlcnNlY3JldGtleWZvcnBmZWVjb21tZXJjZTIwMjQ=}
    depends_on:
      discovery-service:
        condition: service_healthy

  # ─── Microservices ───────────────────────────────────────────────────────────

  user-service:
    build:
      context: ./backend
      dockerfile: user-service/Dockerfile
    container_name: pfe-user-service
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      EUREKA_URL: http://discovery-service:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-bXlzdXBlcnNlY3JldGtleWZvcnBmZWVjb21tZXJjZTIwMjQ=}
    depends_on:
      postgres:
        condition: service_healthy
      discovery-service:
        condition: service_healthy

  product-service:
    build:
      context: ./backend
      dockerfile: product-service/Dockerfile
    container_name: pfe-product-service
    ports:
      - "8082:8082"
    environment:
      MONGO_HOST: mongo
      EUREKA_URL: http://discovery-service:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-bXlzdXBlcnNlY3JldGtleWZvcnBmZWVjb21tZXJjZTIwMjQ=}
    depends_on:
      mongo:
        condition: service_healthy
      discovery-service:
        condition: service_healthy

  order-service:
    build:
      context: ./backend
      dockerfile: order-service/Dockerfile
    container_name: pfe-order-service
    ports:
      - "8083:8083"
    environment:
      DB_HOST: postgres
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      EUREKA_URL: http://discovery-service:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-bXlzdXBlcnNlY3JldGtleWZvcnBmZWVjb21tZXJjZTIwMjQ=}
    depends_on:
      postgres:
        condition: service_healthy
      discovery-service:
        condition: service_healthy

  # ─── Frontend ────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend/ecommerce-app
      dockerfile: Dockerfile
    container_name: pfe-frontend
    ports:
      - "4200:80"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  mongo_data:
